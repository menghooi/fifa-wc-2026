<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:center;gap:7px;padding:4px 9px;height:27px">
  <sc-if value="{{slot.rev}}" hint-placeholder-val="{{true}}">
    <sc-if value="{{slot.hasFlag}}" hint-placeholder-val="{{false}}"><img src="{{slot.flag}}" style="width:20px;height:14px;border-radius:2px;object-fit:cover;box-shadow:0 0 0 1px rgba(255,255,255,.14);flex:none"></sc-if>
    <sc-if value="{{slot.noFlag}}" hint-placeholder-val="{{false}}"><span style="width:20px;height:14px;border-radius:2px;background:#2a3550;display:inline-block;flex:none"></span></sc-if>
    <span style="flex:1;font:600 12px Barlow;color:{{slot.nameColor}};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{slot.name}}</span>
    <span style="font:{{slot.weight}} 13px Archivo;color:{{slot.scoreColor}};flex:none">{{slot.score}}</span>
  </sc-if>
  <sc-if value="{{slot.notRev}}" hint-placeholder-val="{{false}}">
    <span style="display:flex;align-items:center;justify-content:center;min-width:22px;height:16px;padding:0 4px;border-radius:4px;font:800 9px Archivo;color:#fff;background:{{slot.chipColor}};flex:none">{{slot.chip}}</span>
    <span style="flex:1;font:600 11px Barlow;color:#7a86a0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{slot.sub}}</span>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:158,&quot;height&quot;:27},&quot;slot&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;}}"></script>
</body>
</html>
