name: Deploy site to Pages

# Builds wcData.js fresh from openfootball's public-domain feed and
# publishes the static site straight to GitHub Pages as an artifact.
# Nothing is committed back to the repo, so history stays clean.
#
# Triggers:
#   - push to main so code changes go live immediately
#   - manual (Actions tab)
#   - a schedule during the tournament so results and the filling bracket
#     stay current without anyone pressing a button. Comment the schedule
#     back out to return to fully manual deploys.
on:
  push:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    # twice hourly at off-peak minutes (UTC). :00 is GitHub's most congested
    # slot and schedules there drift or skip the most; an arbitrary minute
    # drifts far less, and two ticks an hour halves the staleness cost of a
    # skipped run. openfootball's own auto-gen only refreshes every ~3-6h,
    # so anything faster has diminishing returns.
    - cron: "7,37 * * * *"

# Required for the Actions-based Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build wcData.js from openfootball
        run: node scripts/build-wcdata.mjs

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r project _site/

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
