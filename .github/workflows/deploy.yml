name: Deploy site to Pages

# Publishes the static site straight to GitHub Pages as an artifact.
#
# The tournament is over: project/wcData.js is now the committed, frozen final
# record (Spain champions) and is shipped AS-IS — the build no longer rebuilds
# it from openfootball, and the twice-hourly schedule is retired, so a future
# archiving/degrading of the 2026 feed can never overwrite the final result.
# To re-enable live rebuilds, restore the schedule and the "Build wcData.js"
# step (see git history) and run scripts/build-wcdata.mjs before assembling.
#
# Triggers:
#   - push to main so code changes go live immediately
#   - manual (Actions tab)
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Required for the Actions-based Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r project _site/

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
